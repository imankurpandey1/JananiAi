services:
  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      - STORYCRAFT_HOST=0.0.0.0
      - STORYCRAFT_PORT=5000
      - STORYCRAFT_DEBUG=0
      - STORYCRAFT_DB_PATH=backend/database/storycraft.db
    volumes:
      - storycraft-db:/app/backend/database
      - storycraft-models:/app/backend/models

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://127.0.0.1:5000
    depends_on:
      - backend

volumes:
  storycraft-db:
  storycraft-models:
